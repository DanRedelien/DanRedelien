name: GitHub Profile Summary Card

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: ${{ github.ref_name }}
          AUTO_PUSH: false

      - name: Recolor main profile card
        run: node scripts/theme-profile-card.mjs

      - name: Keep only the long top card
        run: |
          find profile-summary-card-output/github_dark -maxdepth 1 -type f ! -name '0-profile-details.svg' -delete

      - name: Commit generated assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update profile summary card"
          file_pattern: README.md profile-summary-card-output scripts .github/workflows
